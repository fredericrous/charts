apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.workerReplicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ .Release.Name }}-worker
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "./build/worker/index.js"]
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-env
          env:
            - name: TKV_DB_PATH
              value: /db/ticket-vision.sqlite
            - name: OTEL_SERVICE_NAME
              value: ticket-vision-worker
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: data
              mountPath: /db
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          # Liveness: heartbeat file refreshed every 10s by worker main loop
          # If the loop hangs for >60s, restart the pod
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "test $(($(date +%s) - $(stat -c %Y /tmp/ticket-vision-worker.heartbeat 2>/dev/null || echo 0))) -lt 60"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # Startup: give up to 2 minutes for migrations to complete
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "test -f /tmp/ticket-vision-worker.heartbeat"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
