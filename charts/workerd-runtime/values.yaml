image:
  repository: ghcr.io/fredericrous/workerd-runtime
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

http:
  port: 8080

env:
  PORT: "8080"
  # DATABASE_URL, S3_*, BUILDER_PUBLIC_HOST_SUFFIX come from the
  # HelmRelease postRenderer in homelab.

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 2
  periodSeconds: 10

podSecurityContext:
  # 65532 = the nonroot UID baked into gcr.io/distroless/nodejs24:nonroot.
  # If you switch back to the alpine Dockerfile (which creates UID 1000),
  # update these to 1000. Don't override at HelmRelease values — the
  # numbers must match what the image actually has, or the kubelet
  # SecurityContext check fails container start.
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  # Distroless filesystem is read-only-safe; flip on once we confirm
  # nothing writes to /app at runtime. Currently false to avoid
  # surprises with /tmp usage by node modules.
  readOnlyRootFilesystem: false

nodeSelector: {}
tolerations: []
affinity: {}
